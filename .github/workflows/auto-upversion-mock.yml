name: Auto Upversion Mock

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: write

jobs:
  upversion-mock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run version bump script
        run: |
          if [ "${{ github.event.inputs.bump }}" = "major" ]; then
            bun run version:up --major
          elif [ "${{ github.event.inputs.bump }}" = "minor" ]; then
            bun run version:up --minor
          else
            bun run version:up
          fi

      - name: Read new version
        id: read_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request (mock commit)
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: chore(release): mock auto upversion to v${{ steps.read_version.outputs.version }}
          title: chore(release): mock auto upversion to v${{ steps.read_version.outputs.version }}
          body: |
            Automated mock version bump generated by workflow_dispatch.

            - Bump type: ${{ github.event.inputs.bump }}
            - Resulting version: v${{ steps.read_version.outputs.version }}
          branch: chore/mock-auto-upversion/v${{ steps.read_version.outputs.version }}
          delete-branch: true
